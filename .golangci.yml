version: "2"

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - goqlprinter

linters:
  default: none
  enable:
    # --- Correctness ---
    - errcheck        # unhandled errors
    - govet           # go vet checks
    - staticcheck     # static analysis (SA*, S*, QF*)
    - unused          # unused code
    - bodyclose       # HTTP response body not closed
    - noctx           # HTTP requests without context
    - copyloopvar     # loop variable capture
    - intrange        # prefer integer range (Go 1.22+)
    - durationcheck   # two durations multiplied
    - forcetypeassert # unguarded type assertions
    - errorlint       # error wrapping (Go 1.13+)
    - fatcontext      # context in loops

    # --- Security ---
    - gosec

    # --- Style / idioms ---
    - misspell        # typos in comments/strings
    - unconvert       # unnecessary type conversions
    - predeclared     # shadowing built-ins
    - goconst         # repeated strings → constants
    - dupword         # duplicate words in comments

    # --- Complexity (catch extremes only) ---
    - gocyclo
    - funlen

    # --- Bugs / perf ---
    - gocritic

  settings:
    gosec:
      excludes:
        - G304  # file path from variable — debug-output intentional
        - G115  # integer overflow — protocol byte conversions intentional

    misspell:
      locale: US
      ignore-rules:
        - marginaali  # Finnish word in comments

    goconst:
      min-len: 4
      min-occurrences: 3

    gocyclo:
      min-complexity: 35

    funlen:
      lines: 150
      statements: 80

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam   # false positives on image/raster structs

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec
          - noctx
          - funlen
          - goconst

      # Platform-specific backends: unused symbols expected
      - path: "native_.*\\.go"
        linters:
          - unused
